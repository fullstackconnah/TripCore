services:
  db:
    image: postgres:16-alpine
    container_name: tripcore-db
    environment:
      POSTGRES_DB: tripcore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tripcore-api
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=tripcore;Username=postgres;Password=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_CONNECTION_STRING=Host=db;Port=5432;Database=tripcore;Username=postgres;Password=${POSTGRES_PASSWORD:-postgres}
      - JWT_SECRET=${JWT_SECRET:-TripCore-Production-Secret-Key-Change-Me-32-Characters!}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost,http://localhost:80}
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - documents:/data/documents

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: tripcore-frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
  documents:
