services:
  db:
    image: postgres:16-alpine
    container_name: tripcore-db
    environment:
      POSTGRES_DB: tripcore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/fullstackconnah/tripcore-api:latest
    container_name: tripcore-api
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=tripcore;Username=postgres;Password=${POSTGRES_PASSWORD};Trust Server Certificate=true;SSL Mode=Disable
      - JWT_SECRET=${JWT_SECRET}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Production}
      - FIREBASE_SERVICE_ACCOUNT_JSON=${FIREBASE_SERVICE_ACCOUNT_JSON}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - documents:/data/documents

  frontend:
    image: ghcr.io/fullstackconnah/tripcore-frontend:latest
    container_name: tripcore-frontend
    ports:
      - "8475:80"
    depends_on:
      - api

volumes:
  pgdata:
  documents:
